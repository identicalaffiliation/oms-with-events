services:
  migrator:
    container_name: migrator
    build:
      context: ./migrator
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-your_db}
      POSTGRES_USER: ${POSTGRES_USER:-your_nickname}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_password}
      POSTGRES_SSL_MODE: ${POSTGRES_SSL_MODE:-disable}
      MIGRATIONS_PATH: file:///app/migrations
    volumes:
      - ./migrator/config.yml:/app/config.yml:ro
      - ./migrator/migrations:/app/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: postgres-app
    image: postgres:18
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-your_nickname}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_password}
      POSTGRES_DB: ${POSTGRES_DB:-your_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5436:5432"

volumes:
  postgres_data: